<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Practice</title>
    <!-- Tailwind CSS (CDN経由で読み込み) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM (CDN経由で読み込み) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel (ブラウザ内でJSXを変換するために必要) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons (CDN経由で読み込み) -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gradient-to-b from-blue-50 to-blue-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // アイコンをSVGとして直接定義（CDNのReact環境で動かしやすくするため）
        const MicIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg>;
        const VolumeIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>;
        const CheckIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
        const XIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" x2="9" y1="9" y2="15"></line><line x1="9" x2="15" y1="9" y2="15"></line></svg>;
        const HeadphonesIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 14h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-7a9 9 0 0 1 18 0v7a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3"></path></svg>;
        const RestartIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>;

        const steps = [
            { type: 'start' },
            {
                type: 'question',
                qEn: "How do you spell your first name?",
                qJa: "あなたの下の名前をアルファベットで１文字ずつ言いましょう。",
                confirmEn: (text) => `Is this correct? ${text}`,
                confirmJa: (text) => `これであっていますか？ ${text}`,
            },
            {
                type: 'question',
                qEn: "What sport do you like?",
                qJa: "好きなスポーツは何ですか？",
                confirmEn: (text) => text.toLowerCase().startsWith("i like") ? `${text} Is this correct?` : `So you like ${text}?`,
                confirmJa: (text) => text.toLowerCase().startsWith("i like") ? `これであっていますか？` : `あなたが好きなスポーツは、${text}、ですか？`,
            },
            {
                type: 'question',
                qEn: "What is your favorite food?",
                qJa: "好きな食べ物は何ですか？",
                confirmEn: (text) => text.toLowerCase().startsWith("i like") ? `${text} Is this correct?` : `Your favorite food is ${text}?`,
                confirmJa: (text) => text.toLowerCase().startsWith("i like") ? `これであっていますか？` : `好きな食べ物は、${text}、ですか？`,
            },
            {
                type: 'question',
                qEn: "What color do you like?",
                qJa: "好きな色は何ですか？",
                confirmEn: (text) => text.toLowerCase().startsWith("i like") ? `${text} Is this correct?` : `You like ${text}?`,
                confirmJa: (text) => text.toLowerCase().startsWith("i like") ? `これであっていますか？` : `好きな色は、${text}、ですか？`,
            },
            {
                type: 'question',
                qEn: "What is your favorite animal?",
                qJa: "好きな動物は何ですか？",
                confirmEn: (text) => text.toLowerCase().startsWith("i like") ? `${text} Is this correct?` : `Your favorite animal is ${text}?`,
                confirmJa: (text) => text.toLowerCase().startsWith("i like") ? `これであっていますか？` : `好きな動物は、${text}、ですか？`,
            },
            {
                type: 'question',
                qEn: "What else do you like?",
                qJa: "他に好きなことはありますか？",
                confirmEn: (text) => text.toLowerCase().startsWith("i like") ? `${text} Is this correct?` : `You also like ${text}?`,
                confirmJa: (text) => text.toLowerCase().startsWith("i like") ? `これであっていますか？` : `他にも、${text}、が好きなのですね？`,
            },
            {
                type: 'end',
                qEn: "Great job! Next, let's do what the teacher says.",
                qJa: "がんばったね！次は先生が言ったことに取り組みましょう。",
            }
        ];

        function App() {
            const [currentStep, setCurrentStep] = useState(0);
            const [isRecording, setIsRecording] = useState(false);
            const [recognizedText, setRecognizedText] = useState("");
            const [isConfirming, setIsConfirming] = useState(false);
            const [isSupported, setIsSupported] = useState(true);
            const recognitionRef = useRef(null);

            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    setIsSupported(false);
                    return;
                }
                
                const recognition = new SpeechRecognition();
                recognition.lang = 'en-US';
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;

                recognition.onstart = () => setIsRecording(true);
                
                recognition.onresult = (event) => {
                    let transcript = event.results[0][0].transcript.trim();

                    // 名前を尋ねるステップ(currentStep === 1)のときは、最初の文字を大文字にする
                    if (currentStep === 1 && transcript.length > 0) {
                        transcript = transcript.charAt(0).toUpperCase() + transcript.slice(1);
                    }

                    // "I like" で答えたときは末尾にピリオドをつける
                    if (transcript.toLowerCase().startsWith("i like") && !transcript.endsWith(".")) {
                        transcript += ".";
                    }

                    setRecognizedText(transcript);
                    setIsConfirming(true);
                    setIsRecording(false);
                    
                    const stepData = steps[currentStep];
                    speak(stepData.confirmEn(transcript), stepData.confirmJa(transcript));
                };

                recognition.onerror = (event) => {
                    console.error("Speech recognition error", event.error);
                    setIsRecording(false);
                    if (event.error !== 'no-speech') {
                        alert("音声認識でエラーが発生しました。マイクの許可設定を確認してください。");
                    }
                };

                recognition.onend = () => {
                    setIsRecording(false);
                };

                recognitionRef.current = recognition;
            }, [currentStep]);

            const speak = (enText, jaText) => {
                if (!window.speechSynthesis) return;
                window.speechSynthesis.cancel();

                const utteranceEn = new SpeechSynthesisUtterance(enText);
                utteranceEn.lang = 'en-US';
                utteranceEn.rate = 0.9;

                const utteranceJa = new SpeechSynthesisUtterance(jaText);
                utteranceJa.lang = 'ja-JP';

                utteranceEn.onend = () => {
                    window.speechSynthesis.speak(utteranceJa);
                };

                window.speechSynthesis.speak(utteranceEn);
            };

            useEffect(() => {
                if (currentStep > 0) {
                    const stepData = steps[currentStep];
                    if (stepData.type === 'question' && !isConfirming) {
                        speak(stepData.qEn, stepData.qJa);
                    } else if (stepData.type === 'end') {
                        speak(stepData.qEn, stepData.qJa);
                    }
                }
            }, [currentStep]);

            const startListening = () => {
                if (recognitionRef.current && !isRecording) {
                    recognitionRef.current.start();
                }
            };

            const handleYes = () => {
                setIsConfirming(false);
                setRecognizedText("");
                setCurrentStep(prev => prev + 1);
            };

            const handleNo = () => {
                setIsConfirming(false);
                setRecognizedText("");
                const stepData = steps[currentStep];
                speak(stepData.qEn, stepData.qJa);
            };

            const restartApp = () => {
                window.speechSynthesis.cancel();
                setCurrentStep(0);
                setIsConfirming(false);
                setRecognizedText("");
            };

            if (!isSupported) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-red-50 p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-lg max-w-md text-center border-2 border-red-200">
                            <h1 className="text-xl font-bold text-gray-800 mb-2">ブラウザが対応していません</h1>
                            <p className="text-gray-600">お使いのブラウザは音声認識機能に対応していません。Chrome, Edge, Safariをご利用ください。</p>
                        </div>
                    </div>
                );
            }

            const step = steps[currentStep];

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4 font-sans">
                    {currentStep > 0 && currentStep < steps.length - 1 && (
                        <div className="w-full max-w-2xl mb-8">
                            <div className="bg-blue-200 rounded-full h-3">
                                <div className="bg-blue-600 h-3 rounded-full transition-all duration-500" style={{ width: `${(currentStep / (steps.length - 2)) * 100}%` }}></div>
                            </div>
                            <p className="text-right text-sm text-blue-600 mt-2 font-bold">{currentStep} / {steps.length - 2}</p>
                        </div>
                    )}

                    <div className="w-full max-w-2xl bg-white p-8 md:p-12 rounded-3xl shadow-xl flex flex-col items-center">
                        {step.type === 'start' && (
                            <div className="text-center space-y-8">
                                <div className="bg-blue-100 w-32 h-32 rounded-full flex items-center justify-center mx-auto mb-6 text-blue-600">
                                    <HeadphonesIcon />
                                </div>
                                <h1 className="text-3xl font-extrabold text-gray-800 tracking-tight">Let's Practice English!</h1>
                                <div className="bg-yellow-50 border-l-4 border-yellow-400 p-4 text-left">
                                    <p className="text-lg text-gray-700 font-medium">イヤホンをつけて、マイクの準備をしましょう！</p>
                                    <p className="text-sm text-gray-500 mt-1">※マイクの許可を求められたら「許可」を押してください。</p>
                                </div>
                                <button onClick={() => setCurrentStep(1)} className="mt-8 w-full py-4 bg-blue-600 text-white rounded-2xl text-xl font-bold shadow-lg hover:bg-blue-700 transition">
                                    スタート (Start)
                                </button>
                            </div>
                        )}

                        {step.type === 'question' && (
                            <div className="w-full flex flex-col items-center space-y-10">
                                <div className="text-center space-y-4 w-full relative">
                                    <button onClick={() => speak(step.qEn, step.qJa)} className="absolute -top-6 right-0 p-3 text-blue-500 hover:bg-blue-50 rounded-full transition" title="もう一度聞く">
                                        <VolumeIcon />
                                    </button>
                                    <p className="text-2xl md:text-3xl font-extrabold text-gray-800 leading-tight">{step.qEn}</p>
                                    <p className="text-lg md:text-xl text-gray-600 font-medium">{step.qJa}</p>
                                </div>

                                {!isConfirming ? (
                                    <div className="flex flex-col items-center space-y-6 pt-4">
                                        <button onClick={startListening} disabled={isRecording} className={`p-8 rounded-full shadow-lg transition-all duration-300 flex items-center justify-center ${isRecording ? 'bg-red-500 text-white animate-pulse' : 'bg-blue-500 text-white hover:bg-blue-600'}`}>
                                            <MicIcon />
                                        </button>
                                        <p className={`text-lg font-bold ${isRecording ? 'text-red-500 animate-pulse' : 'text-blue-600'}`}>
                                            {isRecording ? "聞いています... (Listening...)" : "マイクを押して英語で答えてね"}
                                        </p>
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center space-y-8 w-full">
                                        <div className="bg-blue-50 p-6 rounded-2xl w-full text-center border-2 border-blue-200">
                                            <p className="text-2xl font-bold text-blue-900 break-words">"{recognizedText}"</p>
                                            <p className="text-gray-600 mt-3 font-medium">これであっていますか？</p>
                                        </div>
                                        <div className="flex flex-col sm:flex-row justify-center space-y-4 sm:space-y-0 sm:space-x-6 w-full">
                                            <button onClick={handleYes} className="flex-1 flex items-center justify-center space-x-2 px-8 py-4 bg-emerald-500 text-white rounded-2xl hover:bg-emerald-600 font-bold text-xl">
                                                <CheckIcon /><span>はい (Yes)</span>
                                            </button>
                                            <button onClick={handleNo} className="flex-1 flex items-center justify-center space-x-2 px-8 py-4 bg-gray-500 text-white rounded-2xl hover:bg-gray-600 font-bold text-xl">
                                                <XIcon /><span>いいえ (No)</span>
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {step.type === 'end' && (
                            <div className="text-center space-y-8 w-full">
                                <div className="text-8xl">🎉</div>
                                <h1 className="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-green-500 leading-tight">
                                    {step.qEn}
                                </h1>
                                <p className="text-xl text-gray-700 font-bold">{step.qJa}</p>
                                <div className="pt-8">
                                    <button onClick={restartApp} className="flex items-center justify-center space-x-2 mx-auto px-8 py-4 bg-blue-100 text-blue-700 rounded-2xl hover:bg-blue-200 font-bold text-lg">
                                        <RestartIcon /><span>最初からやり直す (Restart)</span>
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
